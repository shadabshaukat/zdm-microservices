        ONLINE_PHYSICAL: unsupported
      target:
        OFFLINE_LOGICAL: unsupported
        ONLINE_LOGICAL: unsupported
        OFFLINE_PHYSICAL: unsupported
        ONLINE_PHYSICAL: unsupported
    notes: []
    zdm:
      logical_source:
        SOURCEDATABASE_ENVIRONMENT_NAME: AMAZON
        SOURCEDATABASE_ENVIRONMENT_DBTYPE: RDS_ORACLE
      logical_target: null
      physical_target: null

  OCI_BASE_DATABASE_SERVICE:
