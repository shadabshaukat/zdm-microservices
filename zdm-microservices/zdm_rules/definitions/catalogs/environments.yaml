schema_version: 1
zdm_version: "26.1"

environments:
  ORACLE_DATABASE:
    display:
      group: General
      name: User-managed Oracle Database
    migration_support:
      source:
        OFFLINE_LOGICAL: supported
        ONLINE_LOGICAL: supported
        OFFLINE_PHYSICAL: supported
        ONLINE_PHYSICAL: supported
      target:
        OFFLINE_LOGICAL: supported
        ONLINE_LOGICAL: supported
        OFFLINE_PHYSICAL: supported
        ONLINE_PHYSICAL: supported
    notes:
      - "Physical source must run Linux-x86-64; other source platforms require non-physical workflows."
      - "Physical target must be a directly managed database server with OS user, SSH, and storage/network access."
      - "Online physical requires Data Guard-capable Enterprise Edition; Standard Edition uses offline physical."
    zdm:
      logical_source: {}
      logical_target:
        TARGETDATABASE_DBTYPE: ORACLE
      physical_target:
        PLATFORM_TYPE: NON_CLOUD

  ON_PREMISES_EXADATA_DATABASE_MACHINE:
    display:
      group: On-premises
      name: Oracle Exadata Database Machine
    migration_support:
      source:
        OFFLINE_LOGICAL: supported
        ONLINE_LOGICAL: supported
        OFFLINE_PHYSICAL: supported
        ONLINE_PHYSICAL: supported
      target:
        OFFLINE_LOGICAL: supported
        ONLINE_LOGICAL: supported
        OFFLINE_PHYSICAL: supported
        ONLINE_PHYSICAL: supported
    notes: []
    zdm:
      logical_source: {}
      logical_target:
        TARGETDATABASE_DBTYPE: EXADATA
      physical_target:
        PLATFORM_TYPE: NON_CLOUD

  ORACLE_DATABASE_APPLIANCE:
