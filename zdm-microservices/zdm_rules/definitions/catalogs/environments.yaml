schema_version: 1
zdm_version: "26.1"

environments:
  ORACLE_DATABASE:
    display:
      group: General
      name: User-managed Oracle Database
    supports:
      source: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
      target: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
    rule_groups:
      logical:
        source: ORACLE_DATABASE
        target: USER_MANAGED
      physical:
        target: NON_CLOUD
    notes:
      - "Physical source must run Linux-x86-64; other source platforms require non-physical workflows."
      - "Physical target must be a directly managed database server with OS user, SSH, and storage/network access."
      - "Online physical requires Data Guard-capable Enterprise Edition; Standard Edition uses offline physical."
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: ORACLE
      physical_target:
        PLATFORM_TYPE: NON_CLOUD

  ON_PREMISES_EXADATA_DATABASE_MACHINE:
    display:
      group: On-premises
      name: Oracle Exadata Database Machine
    supports:
      source: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
      target: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
    rule_groups:
      logical:
        source: ORACLE_DATABASE
        target: CO_MANAGED
      physical:
        target: NON_CLOUD
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: EXADATA
      physical_target:
        PLATFORM_TYPE: NON_CLOUD

  ORACLE_DATABASE_APPLIANCE:
    display:
      group: On-premises
      name: Oracle Database Appliance (ODA)
    supports:
      source: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
      target: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
    rule_groups:
      logical:
        source: ORACLE_DATABASE
        target: CO_MANAGED
      physical:
        target: NON_CLOUD
    notes:
      - "ODA-to-ODA physical migration: source and target must be Oracle Database Appliance, including ODA Base Database Service and ODA KVM."
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: ORACLE
      physical_target:
        PLATFORM_TYPE: NON_CLOUD

  AMAZON_RDS_ORACLE:
    display:
      group: Amazon Web Services
      name: Amazon RDS for Oracle
    supports:
      source: [OFFLINE_LOGICAL, ONLINE_LOGICAL]
    rule_groups:
      logical:
        source: AWS_RDS_ORACLE
    zdm:
      logical_source:
        SOURCEDATABASE_ENVIRONMENT_NAME: AMAZON
        SOURCEDATABASE_ENVIRONMENT_DBTYPE: RDS_ORACLE

  OCI_BASE_DATABASE_SERVICE:
    display:
      group: Oracle Cloud Infrastructure
      name: Oracle Base Database Service (BaseDB / VMDB)
    supports:
      source: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
      target: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
    rule_groups:
      logical:
        source: ORACLE_DATABASE
        target: CO_MANAGED
      physical:
        target: VMDB
    notes:
      - "Physical target must run Linux x86-64 and allow required ZDM host access."
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: ORACLE
      physical_target:
        PLATFORM_TYPE: VMDB

  OCI_EXADATA_DATABASE_SERVICE_DEDICATED:
    display:
      group: Oracle Cloud Infrastructure
      name: Oracle Exadata Database Service on Dedicated Infrastructure (ExaDB-D / ExaCS)
    supports:
      source: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
      target: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
    rule_groups:
      logical:
        source: ORACLE_DATABASE
        target: CO_MANAGED
      physical:
        target: EXACS
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: EXADATA
      physical_target:
        PLATFORM_TYPE: EXACS

  OCI_EXADATA_DATABASE_SERVICE_EXASCALE:
    display:
      group: Oracle Cloud Infrastructure
      name: Oracle Exadata Database Service on Exascale Infrastructure (ExaDB-XS / ExaCS)
    supports:
      source: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
      target: [OFFLINE_LOGICAL, ONLINE_LOGICAL, OFFLINE_PHYSICAL, ONLINE_PHYSICAL]
    rule_groups:
      logical:
        source: ORACLE_DATABASE
        target: CO_MANAGED
      physical:
        target: EXACS
    notes:
      - "Physical migration to ExaDB-XS is limited to Oracle AI Database 26ai targets."
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: EXADATA
      physical_target:
        PLATFORM_TYPE: EXACS

  OCI_AUTONOMOUS_AI_DATABASE_SERVERLESS:
    display:
      group: Oracle Cloud Infrastructure
      name: Oracle Autonomous AI Database Serverless (ADB-S)
    supports:
      target: [OFFLINE_LOGICAL, ONLINE_LOGICAL]
    rule_groups:
      logical:
        target: ADB
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: ADBS

  OCI_AUTONOMOUS_AI_DATABASE_DEDICATED:
