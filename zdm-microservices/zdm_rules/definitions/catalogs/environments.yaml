    rule_groups:
      logical:
        source: ORACLE
        target: CO_MANAGED
      physical:
        target: EXACS
    notes:
      - "Physical migration to ExaDB-XS is limited to Oracle AI Database 26ai targets."
    zdm:
      logical_target:
        TARGETDATABASE_DBTYPE: EXADATA
      physical_target:
        PLATFORM_TYPE: EXACS

  OCI_ADB_S:
